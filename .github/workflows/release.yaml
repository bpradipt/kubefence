name: release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      nono_version:
        description: "nono source tag to build (e.g. v0.23.0). Defaults to NONO_VERSION below."
        required: false
        default: ""

# Default nono source tag to build. Update when a new nono is released.
env:
  NONO_VERSION: v0.23.0
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Resolve nono version
        id: nono
        run: |
          VERSION="${{ inputs.nono_version }}"
          if [ -z "$VERSION" ]; then
            VERSION="${{ env.NONO_VERSION }}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building nono from source: $VERSION"

      - name: Cache Rust registry (shared with Docker build container)
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: nono-glibc-${{ steps.nono.outputs.version }}
          restore-keys: nono-glibc-

      - name: Build nono binary (glibc, inside rust:1.85-slim-bullseye)
        env:
          NONO_VERSION: ${{ steps.nono.outputs.version }}
          OUT: ${{ github.workspace }}/nono
        run: bash scripts/build-nono.sh

      - name: Verify binary dependencies
        run: |
          echo "nono binary: $(file ./nono)"
          echo "size: $(du -sh ./nono | cut -f1)"
          echo "ldd:"
          ldd ./nono

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # On release: tag with semver (v1.2.3 → 1.2.3 and 1.2) + latest
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.event_name == 'release' }}
            # On manual dispatch: tag with nono version for traceability
            type=raw,value=nono-${{ steps.nono.outputs.version }},enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
